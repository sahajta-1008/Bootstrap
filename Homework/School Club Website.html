<!DOCTYPE html>
<html>

<head>
    <title>School Club Website</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- STEP 1 - Bootstrap CSS link -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <style>
        body {
            background-color: #d6f6ff;
            font-family: Arial, sans-serif;
            padding: 30px 15px;
        }

        h1 {
            text-align: center;
            color: black;
        }

        .club-card {
            text-align: center;
            border: 2px solid blue;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: rgb(164, 225, 245);
        }

        .club-card h3 {
            color: darkblue;
        }
    </style>
</head>

<body>

    <h1>My School Clubs</h1>

    <div class="container">

        <div class="row">

            <div class="col-12 col-md-6 col-lg-4">
                <div class="club-card">
                    <h3>Coding Club</h3>
                    <p>I learn how to create websites, games, and simple apps.</p>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="club-card">
                    <h3>Science Club</h3>
                    <p>I enjoy doing experiments and discovering how things work.</p>
                </div>
            </div>

            <div class="col-12 col-md-12 col-lg-4">
                <div class="club-card">
                    <h3>Art Club</h3>
                    <p>I love drawing, painting, and creating colourful designs.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">
    </script>

</body>

</html>
